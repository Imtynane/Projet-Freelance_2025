<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- TITRE & DESCRIPTION -->
  <title>StudyMate</title>
  <meta name="description" content="StudyMate : emploi du temps, budget et tâches pour étudiants. Simple, moderne et gratuit à tester." />

  <!-- OPEN GRAPH (Facebook, LinkedIn, WhatsApp, etc.) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="StudyMate — Organise tes études comme un pro" />
  <meta property="og:description" content="Planifie ton emploi du temps, gère ton budget et reste productif avec StudyMate." />
  <meta property="og:image" content="http://localhost:5173/fallback/desola-lanre-ologun-kwzWjTnDPLk-unsplash.jpg" />
  <meta property="og:url" content="http://localhost:5173/" />

  <!-- TWITTER CARDS -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="StudyMate — Organise tes études comme un pro" />
  <meta name="twitter:description" content="L’application étudiante qui simplifie ton organisation quotidienne." />
  <meta name="twitter:image" content="http://localhost:5173/fallback/desola-lanre-ologun-kwzWjTnDPLk-unsplash.jpg" />

  <!-- SEO TECHNIQUE -->
  <link rel="canonical" href="http://localhost:5173/" />
  <meta name="robots" content="index, follow" />

  <!-- ICONES -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#2563EB" />

  <!-- PERFORMANCE -->
  <link rel="preload" as="image" href="/public/fallback-optimized/undraw_online-meetings_zutp.png" />

  <!-- JSON-LD (structured data pour Google) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "StudyMate",
    "url": "http://localhost:5173",
    "publisher": {
      "@type": "Organization",
      "name": "StudyMate",
      "logo": {
        "@type": "ImageObject",
        "url": "http://localhost:5173/favicon.ico"
      }
    },
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://http://localhost:5173/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>
<body class="antialiased text-gray-900">
  <!-- Skip link pour accessibilité -->
  <a href="#main" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-white p-2 rounded shadow">
    Passer au contenu
  </a>

  <!-- Point d’ancrage React -->
  <div id="root"></div>

  <!-- Script principal injecté par Vite -->
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
